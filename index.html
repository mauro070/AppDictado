<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Grabar Notas</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f14">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root {
    color-scheme: dark;
    --bg:#0d0f14; --surface:#1a1e27; --surface2:#232935; --border:#2c313c;
    --text:#e6e8ec; --muted:#9aa3b2; --accent:#0999d8; --accent-ink:#04202b;
    --rec:#ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0 auto; padding: 16px; max-width: 760px;
    background:var(--bg); color:var(--text);
    font-family:-apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }
  h2 { color:var(--accent); margin:8px 0 16px; font-size:26px; }
  label { display:block; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; font-size:12px; margin:12px 0 6px; }
  #vivo {
    min-height:44px; background:var(--surface2); border:1px solid var(--border); border-radius:10px;
    padding:10px; color:var(--accent); font-style:italic; transition:border-color .2s, box-shadow .2s;
  }
  #vivo.on { border-color:var(--rec); box-shadow:0 0 0 1px var(--rec) inset; color:#fca5a5; }
  #texto {
    width:100%; min-height:220px; background:var(--surface); color:var(--text);
    border:1px solid var(--border); border-radius:10px; padding:12px; font-size:16px;
    line-height:1.45; resize:vertical;
  }
  #texto:focus { outline:none; border-color:var(--accent); }
  .fila { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
  button { flex:1; min-width:120px; border:0; border-radius:10px; padding:14px; font-weight:700; font-size:15px; cursor:pointer; transition:background .15s, box-shadow .15s; }
  .rec-btn { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .rec-btn:hover { background:#2b3240; }
  .rec-btn.grabando { background:var(--rec); color:#fff; border-color:var(--rec); animation:pulse 1.4s infinite; }
  @keyframes pulse {
    0%   { box-shadow:0 0 0 0 rgba(239,68,68,.55); }
    70%  { box-shadow:0 0 0 16px rgba(239,68,68,0); }
    100% { box-shadow:0 0 0 0 rgba(239,68,68,0); }
  }
  .go { background:var(--accent); color:var(--accent-ink); }
  .go:hover { background:#1fb0ea; }
  .go:disabled { opacity:.5; cursor:default; }
  .del { background:transparent; color:var(--muted); border:1px solid var(--border); flex:0 0 auto; min-width:52px; }
  .del:hover { color:var(--rec); border-color:var(--rec); }
  #estado { margin-top:14px; padding-top:10px; border-top:1px solid var(--border); color:var(--muted); font-size:13px; min-height:18px; }
  #version { margin-top:24px; text-align:center; color:var(--border); font-size:12px; letter-spacing:.05em; }
</style>
</head>
<body>
  <h2>Grabar Notas</h2>

  <label>En vivo</label>
  <div id="vivo">…</div>

  <label>Texto (editable)</label>
  <textarea id="texto" placeholder="Acá aparece lo dictado. Tocá para mover el cursor y editar a mano."></textarea>

  <div class="fila">
    <button id="btnRec" class="rec-btn">🎙️ Grabar</button>
    <button id="btnEnviar" class="go">✅ Enviar</button>
    <button id="btnLimpiar" class="del">🗑️</button>
  </div>

  <div id="estado"></div>
  <div id="version"></div>

<script>
  // ====== EDITAR A MANO ======
  const VERSION = 'v4.0';                            // subí este número cuando cambies algo
  const TOKEN = 'vIi94e-T6XSiwPHDaKue1vKhXyrJLR-U';  // debe coincidir con el TOKEN de Codigo.gs
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxhso_poFS_F3Hf68ZnmIJmFX1_qSLJhJ6SPGxTc9ygqLnhcnAt30UbPW7Do1VEXWWc8w/exec';
  // ===========================
  const KEY = 'grabarnotas_texto';

  const ta = document.getElementById('texto');
  const vivo = document.getElementById('vivo');
  const btnRec = document.getElementById('btnRec');
  const btnEnviar = document.getElementById('btnEnviar');
  const btnLimpiar = document.getElementById('btnLimpiar');
  const estado = document.getElementById('estado');
  document.getElementById('version').textContent = VERSION;
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let rec = null, grabando = false, cursor = 0, wakeLock = null;

  // Autoguardado: restaurar al abrir
  try { const g = localStorage.getItem(KEY); if (g) { ta.value = g; cursor = g.length; } } catch(_){}
  function guardar() { try { localStorage.setItem(KEY, ta.value); } catch(_){} }

  // Mantener pantalla encendida mientras se graba
  async function lockScreen() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(_){}
  }
  async function unlockScreen() {
    try { if (wakeLock) { await wakeLock.release(); wakeLock = null; } } catch(_){}
  }
  document.addEventListener('visibilitychange', () => {
    if (grabando && document.visibilityState === 'visible') lockScreen();
  });

  if (!SR) {
    estado.textContent = 'Este navegador no soporta dictado. Abrilo en Chrome.';
    btnRec.disabled = true;
  }

  // Guardar posicion del cursor para insertar / continuar desde ahi
  const guardarCursor = () => { cursor = ta.selectionStart; };
  ta.addEventListener('click', guardarCursor);
  ta.addEventListener('keyup', guardarCursor);
  ta.addEventListener('input', () => { guardarCursor(); guardar(); });

  function insertar(txt) {
    const antes = ta.value.slice(0, cursor);
    const despues = ta.value.slice(cursor);
    const sep = (antes && !/\s$/.test(antes)) ? ' ' : '';
    ta.value = antes + sep + txt + despues;
    cursor = (antes + sep + txt).length;
    ta.selectionStart = ta.selectionEnd = cursor;
    guardar();
  }

  function crearRec() {
    const r = new SR();
    r.lang = 'es-AR';
    r.continuous = false;      // Android: 1 frase por sesion (evita duplicados)
    r.interimResults = true;
    r.maxAlternatives = 1;
    let insertados = 0;

    r.onstart = () => { insertados = 0; };
    r.onresult = (e) => {
      let interim = '';
      for (let i = 0; i < e.results.length; i++) {
        const res = e.results[i];
        if (res.isFinal) {
          if (i >= insertados) { insertar(res[0].transcript.trim()); insertados = i + 1; }
        } else {
          interim += res[0].transcript;
        }
      }
      vivo.textContent = interim || '…';
    };
    r.onerror = (e) => {
      if (e.error === 'no-speech' || e.error === 'aborted') return;
      estado.textContent = 'Error de dictado: ' + e.error;
    };
    r.onend = () => {
      if (grabando) setTimeout(() => { if (grabando) { try { r.start(); } catch(_){} } }, 300);
    };
    return r;
  }

  function empezar() {
    if (!rec) rec = crearRec();
    grabando = true;
    lockScreen();
    try { rec.start(); } catch(_){}
    btnRec.textContent = '⏹️ Detener';
    btnRec.classList.add('grabando');
    vivo.classList.add('on');
    estado.textContent = 'Grabando… hablá.';
  }

  function detener() {
    grabando = false;
    unlockScreen();
    if (rec) rec.stop();
    vivo.textContent = '…';
    vivo.classList.remove('on');
    btnRec.classList.remove('grabando');
    btnRec.textContent = '▶️ Continuar';
    estado.textContent = 'Pausado. Tocá el texto donde quieras seguir y "Continuar".';
  }

  btnRec.addEventListener('click', () => grabando ? detener() : empezar());

  btnLimpiar.addEventListener('click', () => {
    if (!ta.value || confirm('¿Borrar todo el texto?')) {
      ta.value = ''; cursor = 0; vivo.textContent = '…'; guardar();
      estado.textContent = 'Texto borrado.';
    }
  });

  btnEnviar.addEventListener('click', async () => {
    const texto = ta.value.trim();
    if (!texto) { estado.textContent = 'No hay nada para enviar.'; return; }
    if (grabando) detener();
    btnEnviar.disabled = true;
    estado.textContent = 'Enviando…';
    try {
      const r = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ token: TOKEN, texto })
      });
      const data = await r.json();
      if (data.ok) { estado.textContent = '✅ Enviado al Doc.'; ta.value = ''; cursor = 0; guardar(); }
      else { estado.textContent = '⚠️ Error: ' + (data.error || 'desconocido'); }
    } catch (err) {
      estado.textContent = '⚠️ Se envió, pero sin confirmación. Revisá el Doc.';
    } finally {
      btnEnviar.disabled = false;
    }
  });
</script>
</body>
</html>
